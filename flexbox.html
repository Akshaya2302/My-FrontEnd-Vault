<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox Tutorial</title>
    <style>
      .container {
        height: 544px;
        width: 100%;
        border: 2px solid black;
        /* Initialize the container as a flex box */
        display: flex;
        /* flex properties */
        /* flex-wrap: wrap-reverse; */
        /* flex-direction: column; */
        /* flex-direction: row-reverse;
        flex-direction: row;
        flex-direction: column-reverse;*/

        /* justify the content in horizontal */
        /* justify-content: center;
        justify-content: space-between; */
        /* justify-content: space-evenly; */
        /* justify-content: space-around;
        align-items: center;
        align-items: flex-end; */
        /* align-items: flex-start; */

        /* flex-flow: row-reverse wrap; */
      }
      .item {
        width: 200px;
        height: 200px;
        background-color: tomato;
        border: 2px solid green;
        margin: 10px;
        padding: 3px;
      }
      #item-1 {
        /* flex properties for a flex item */
        /* higher the order , later it shows up in the container */
        /* order: 2; */
        flex-grow: 2;
      }
      #item-2 {
        /* flex-grow: 3;
        flex-shrink: 3; */
        flex-basis: 320px;
      }
      #item-3 {
        /* flex: 2 2 344px; */
        align-self: center;
        align-self: start;
        align-self: end;
      }
    </style>
  </head>
  <body>
    <h1>Flexbox Tutorial</h1>
    <div class="container">
      <div class="item" id="item-1">First Box</div>
      <div class="item" id="item-2">Second Box</div>
      <div class="item" id="item-3">THird Box</div>
      <!-- <div class="item" id="item-4">Fourth Box</div>
      <div class="item" id="item-5">Fifth Box</div>
      <div class="item" id="item-6">Sixth Box</div> -->
    </div>
  </body>
</html>
