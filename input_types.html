<!doctype html>
<html>
  <head>
    <title>All Input Types Example</title>
  </head>
  <body>
    <h2>User Registration Form</h2>

    <form action="/submit-data" method="POST">
      <p>
        <label for="fullName">Full Name (Text):</label><br />
        <input type="text" id="fullName" name="user_name" placeholder="Akshu" />
      </p>

      <p>
        <label for="userPassword">Password (Hidden Text):</label><br />
        <input type="password" id="userPassword" name="user_password" />
      </p>

      <p>
        <label for="userEmail">Email Address:</label><br />
        <input
          type="email"
          id="userEmail"
          name="user_email"
          placeholder="example@mail.com"
        />
      </p>

      <p>
        <label for="userAge">Age (Numbers Only):</label><br />
        <input type="number" id="userAge" name="user_age" min="1" max="100" />
      </p>

      <p>
        <label for="userBirthdate">Date of Birth (Calendar):</label><br />
        <input type="date" id="userBirthdate" name="user_birthday" />
      </p>

      <p>
        <label>Gender:</label><br />
        <input type="radio" id="genderMale" name="gender" value="male" />
        <label for="genderMale">Male</label>

        <input type="radio" id="genderFemale" name="gender" value="female" />
        <label for="genderFemale">Female</label>
      </p>

      <p>
        <input type="checkbox" id="subscribe" name="newsletter" value="yes" />
        <label for="subscribe">Subscribe to daily updates</label>
      </p>

      <p>
        <label for="favColor">Choose Your Favorite Color:</label><br />
        <input
          type="color"
          id="favColor"
          name="favorite_color"
          value="#0000ff"
        />
      </p>

      <p>
        <label for="userFile">Upload Profile Picture:</label><br />
        <input type="file" id="userFile" name="profile_pic" />
      </p>

      <p>
        <input type="submit" value="Submit Form" />
      </p>
    </form>
  </body>
</html>
