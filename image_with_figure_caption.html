<!doctype html>
<html lang="en">
  <head>
    <title>Figure and Caption Example</title>
    <style>
      /* This just styles the figure box nicely so you can see its boundaries */
      figure {
        border: 1px solid #ccc;
        padding: 10px;
        width: 300px;
        background-color: #f9f9f9;
        margin: 20px auto;
        text-align: center;
      }

      figure img {
        width: 100%; /* Makes the image fit perfectly inside the figure box */
        height: auto;
      }

      /* This styles the text caption below the image */
      figcaption {
        font-style: italic;
        color: #555;
        margin-top: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <figure>
      <img src="https://picsum.photos/300/200" alt="Beautiful landscape" />
      <figcaption>
        Figure 1: A random beautiful landscape placeholder image.
      </figcaption>
    </figure>
  </body>
</html>
