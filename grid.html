<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Grid</title>
    <style>
      .container {
        border: 3px solid rgb(0, 0, 0);
        width: 80vw;
        height: 100vh;
        display: grid;
        grid-template-columns: 120px 100px;
        grid-template-rows: 100px 100px 100px;
        /* grid-template-columns: 1fr 2fr 1fr;
        grid-template-rows: 1fr 2fr 1fr; */
        /* or it can be also repeat(4, 1fr) and also repeat(4, minmax(100px, 1fr)) */
        gap: 34px;
        row-gap: 10px;
        column-gap: 44px;
        justify-content: center;
        place-content: center;
      }
      .item {
        border: 2px solid red;
        height: 55px;
        width: 55px;
      }
      /* .item-4 {
        /* grid-row: 1/2; /* this 1/2 is used to place that item 4 in item 1 */
      /* grid-column: 2/3; */
      /* those 1 and 2 are the number in the grids */
      /* }
      .item-1 { */
      /* grid-row: 1/2;
        grid-column: 1/2; */
      /* .item-3 {
            grid-row: 2/3;
            grid-column: 1/2;
          }
          .item-5 {
            grid-row: 1/2;
            grid-column: 1/2;
          }*/
      /* } */
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item item-1">1</div>
      <div class="item">2</div>
      <div class="item item-3">3</div>
      <div class="item item-4">4</div>
      <div class="item item-5">5</div>
    </div>
  </body>
</html>
