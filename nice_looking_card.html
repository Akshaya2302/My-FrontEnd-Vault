<!DOCTYPE html>
<html lang="en">

<head>
    <title>Profile Card</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f2f5;
            font-family: Arial, sans-serif;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 250px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #6c63ff;
            color: white;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        h2 {
            margin: 0;
            color: #333;
        }

        p {
            color: #888;
            font-size: 14px;
        }

        .btn {
            margin-top: 15px;
            padding: 10px 25px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background: #574fd6;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="avatar">👤</div>
        <h2>Akshaya C S</h2>
        <p>Web Developer</p>
        <p>📍 Bangalore, India</p>
        <button class="btn">Follow</button>
    </div>

</body>

</html>
