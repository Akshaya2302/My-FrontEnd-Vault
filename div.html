<!doctype html>
<html>
  <head>
    <title>Simple Div Example</title>
    <style>
      /* This styles the container box */
      .my-box {
        background-color: lightyellow;
        border: 2px solid orange;
        width: 250px;
        padding: 20px;
        text-align: center;
      }

      /* This styles the button inside the box */
      .my-box button {
        background-color: orange;
        color: white;
        padding: 8px;
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="my-box">
      <h3>Pro Running Shoes</h3>
      <p>Price: $89.99</p>
      <button>Add to Cart</button>
    </div>
  </body>
</html>
